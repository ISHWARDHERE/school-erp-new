<!DOCTYPE html>
<html>
<head>
    <title>Add Result</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

{% if success %}
<script>
    alert("Result Saved Successfully");
</script>
{% endif %}

<div class="sidebar">
    <h2>School ERP</h2>
    <a href="/admin_dashboard">Dashboard</a>
    <a href="/web_result">Add Result</a>
    <a href="/web_result_list">Result Report</a>
    <a href="/export_results_excel">
        Download Excel
    </a>
</div>

<div class="main">
    <div class="login-box">
        <h2>Add Result</h2>

        <form action="/save_result_web" method="post">

            <select name="student_id">
                {% for student in students %}
                <option value="{{ student.id }}">
                    {{ student.student_name }}
                </option>
                {% endfor %}
            </select><br><br>

            <input type="text"
                   name="subject"
                   placeholder="Subject"
                   required><br><br>

            <input type="text"
                   name="marks"
                   placeholder="Marks"
                   required><br><br>

            <input type="text"
                   name="total_marks"
                   placeholder="Total Marks"
                   required><br><br>

            <button type="submit">Save Result</button>

        </form>
    </div>
</div>

</body>
</html>
