<!DOCTYPE html>
<html>
<head>
    <title>Add Teacher</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

{% if success %}
<script>
    alert("Teacher Saved Successfully");
</script>
{% endif %}

<div class="sidebar">
    <h2>School ERP</h2>
    <a href="/admin_dashboard">Dashboard</a>
    <a href="/web_teachers">Teacher List</a>
    <a href="/add_teacher_web">Add Teacher</a>
</div>

<div class="main">
    <div class="login-box">
        <h2>Add Teacher</h2>

        <form action="/save_teacher_web"method="post">

            <input type="text"
                   name="teacher_name"
                   placeholder="Teacher Name"
                   required><br><br>

            <input type="text"
                   name="mobile"
                   placeholder="Mobile Number"
                   required><br><br>

            <input type="text"
                   name="subject"
                   placeholder="Subject"
                   required><br><br>

            <input type="text"
                   name="salary"
                   placeholder="Salary"
                   required><br><br>

            <button type="submit">Save Teacher</button>

        </form>
    </div>
</div>

</body>
</html>
