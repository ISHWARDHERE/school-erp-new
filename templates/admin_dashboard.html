<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="sidebar">
    <h2>THE RISING STAR</h2>

    <a href="/admin_dashboard">Dashboard</a>
    <a href="/web_students">Students</a>
    <a href="/web_teachers">Teachers</a>
    <a href="/web_attendance">Attendance</a>
    <a href="/web_fees">Fees</a>
    <a href="/web_result">Results</a>
    <a href="/add_homework">Homework</a>
    <a href="/view_notices">Notices</a>
    <a href="/admission_requests">Admission</a>
    <a href="/attendance_report">Reports</a>
    <a href="/logout">Logout</a>
</div>

<div class="main">

    <div class="topbar">
        <h1>Admin Dashboard</h1>
    </div>

    <div class="stats">

        <div class="stat-card">
            <h3>Total Students</h3>
            <p>{{ students }}</p>
        </div>

        <div class="stat-card">
            <h3>Total Teachers</h3>
            <p>{{ teachers }}</p>
        </div>

        <div class="stat-card">
            <h3>Total Fees</h3>
            <p>{{ fees }}</p>
        </div>

        <div class="stat-card">
            <h3>Total Results</h3>
            <p>{{ results }}</p>
        </div>

    </div>

</div>

</body>
</html>
