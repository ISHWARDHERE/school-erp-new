<!DOCTYPE html>
<html>
<head>
    <title>Teacher Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="sidebar">
    <h2>Teacher Panel</h2>
    <a href="/teacher_dashboard">Dashboard</a>
    <a href="/web_attendance">Attendance</a>
    <a href="/web_result">Results</a>
    <a href="/logout">Logout</a>
</div>

<div class="main">
    <h1>Teacher Dashboard</h1>

    <h2>Student List</h2>

    <table border="1">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Class</th>
            <th>Mobile</th>
        </tr>

        {% for student in students %}
        <tr>
            <td>{{ student.id }}</td>
            <td>{{ student.student_name }}</td>
            <td>{{ student.class_name }}</td>
            <td>{{ student.mobile }}</td>
        </tr>
        {% endfor %}
    </table>

</div>

</body>
</html>
