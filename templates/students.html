<!DOCTYPE html>
<html>
<head>
    <title>Students</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="sidebar">
    <h2>School ERP</h2>
    <a href="/admin_dashboard">Dashboard</a>
    <a href="/web_students">Students</a>
    <a href="/add_student_web">Add Student</a>
    <a href="/export_students_excel">
        Download Excel
    </a>
</div>

<div class="main">
    <h2>Student List</h2>

    <table>
        <tr>
            <th>Name</th>
            <th>Class</th>
            <th>Mobile</th>
            <th>Yearly Fee</th>
            <th>Action</th>
            <th>ID Card</th>
        </tr>

        {% for student in students %}
        <tr>
            <td>{{ student.student_name }}</td>
            <td>{{ student.class_name }}</td>
            <td>{{ student.mobile }}</td>
            <td>{{ student.yearly_fee }}</td>
            <td>
                    <a href="/edit_student_web/{{ student.id }}">Edit</a>
                    |
                    <a href="/delete_student_web/{{ student.id }}">Delete</a>
            </td>
            <td>
                <a href="/id_card/{{ student.id }}" target="_blank">
                    Print ID Card
                </a>
            </td>
        </tr>
        {% endfor %}
    </table>
</div>

</body>
</html>
