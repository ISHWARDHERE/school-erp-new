<!DOCTYPE html>
<html>
<head>
    <title>Edit Student</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="sidebar">
    <h2>School ERP</h2>
    <a href="/admin_dashboard">Dashboard</a>
    <a href="/web_students">Student List</a>
    <a href="/add_student_web">Add Student</a>
</div>

<div class="main">
    <div class="login-box">
        <h2>Edit Student</h2>

        <form action="/update_student_web/{{ student.id }}" method="post">

            <input type="text"
                   name="student_name"
                   value="{{ student.student_name }}"><br><br>

            <input type="text"
                   name="class_name"
                   value="{{ student.class_name }}"><br><br>

            <input type="text"
                   name="mobile"
                   value="{{ student.mobile }}"><br><br>

            <input type="text"
                   name="yearly_fee"
                   value="{{ student.yearly_fee }}"><br><br>

            <button type="submit">Update Student</button>

        </form>
    </div>
</div>

</body>
</html>
