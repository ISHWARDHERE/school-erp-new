<!DOCTYPE html>
<html>
<head>
    <title>Admission Requests</title>
</head>
<body>

<h2>Online Admission Requests</h2>

<table border="1" width="100%">
    <tr>
        <th>ID</th>
        <th>Student Name</th>
        <th>Class</th>
        <th>Father Name</th>
        <th>Mobile</th>
        <th>Photo</th>
        <th>Action</th>
    </tr>

    {% for student in admissions %}
    <tr>
        <td>{{ student.id }}</td>
        <td>{{ student.student_name }}</td>
        <td>{{ student.class_name }}</td>
        <td>{{ student.father_name }}</td>
        <td>{{ student.mobile }}</td>
        <td>
            <img src="/{{ student.photo }}" width="80">
        </td>
        <td>
            <a href="/approve_admission/{{ student.id }}">Approve</a>
        </td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
