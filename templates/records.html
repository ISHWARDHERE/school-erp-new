<!DOCTYPE html>
<html>
<head>
    <title>Attendance Records</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="main">
    <h2>Attendance Records</h2>

    <table border="1" width="100%">
        <tr>
            <th>Student Name</th>
            <th>Status</th>
            <th>Date</th>
        </tr>

        {% for record in records %}
        <tr>
            <td>{{ record.student_name }}</td>
            <td>{{ record.status }}</td>
            <td>{{ record.date }}</td>
        </tr>
        {% endfor %}
    </table>

</div>

</body>
</html>
